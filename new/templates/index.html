<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Access Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="left">
        <img src="{{ url_for('static', filename='images/campus.png') }}" alt="campus">
    </div>

    <div class="right">
        <div class="login-box">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo" alt="logo">

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username" class="input-label">帳號</label>
                    <div class="input-box">
                        <span class="input-icon">
                            <img src="{{ url_for('static', filename='images/user.png') }}" alt="user">
                        </span>
                        <input type="text" id="username" name="username" placeholder="請輸入您的帳號" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="input-label">密碼</label>
                    <div class="input-box">
                        <span class="input-icon-2">
                            <img src="{{ url_for('static', filename='images/lock.png') }}" alt="lock">
                        </span>
                        <input type="password" id="password" name="password" placeholder="請輸入您的密碼" required>
                        <button type="button" class="toggle-password">👁</button>
                    </div>
                    <p class="forgot-text">忘記密碼？</p>
                </div>

                <button type="submit" class="login-btn">
                    <span>帳號登入</span>
                    <span class="arrow">›</span>
                </button>

                <p class="activate-text">啟用帳號</p>

            </form>

        </div>
    </div>
</div>

</body>
</html>
