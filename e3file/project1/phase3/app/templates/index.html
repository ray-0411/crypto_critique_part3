<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAuthn 身份驗證演示</title>
    <style>
        /* 基礎樣式重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        /* 登入卡片 */
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: #4a5568;
        }

        /* 輸入框樣式 */
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        /* 按鈕組 */
        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #registerBtn {
            background-color: #edf2f7;
            color: #4a5568;
        }

        #registerBtn:hover {
            background-color: #e2e8f0;
        }

        #loginBtn {
            background-color: #667eea;
            color: white;
        }

        #loginBtn:hover {
            background-color: #5a67d8;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        /* 訊息提示 */
        #message {
            margin-top: 20px;
            font-size: 1.5rem;
            min-height: 1.2rem;
            color: #000000;
            line-height: 1.5;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WebAuthn Demo</h1>

        <input type="text" id="username" placeholder="請輸入使用者名稱" autocomplete="username">
        
        <div class="button-group">
            <button id="registerBtn">註冊</button>
            <button id="loginBtn">登入</button>
        </div>

        <p id="message"></p>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
